<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain Tumor MRI Classifier</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1e2430;
      --muted: #5b6475;
      --accent: #1565c0;
      --accent-2: #0d47a1;
      --border: #d9dfeb;
      --ok: #0b7a4b;
      --err: #b71c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f7fc 0%, #edf2fa 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 16px 42px rgba(16, 24, 40, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    input[type="file"] {
      flex: 1;
      min-width: 240px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-2); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    pre {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
      min-height: 76px;
    }

    .status {
      margin: 8px 0 12px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .ok { color: var(--ok); }
    .err { color: var(--err); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Brain Tumor MRI Classifier</h1>
    <p>Upload an MRI image and run inference using the loaded model checkpoint.</p>

    <form id="predict-form">
      <div class="row">
        <input id="file" type="file" accept="image/*" required />
        <button id="submit-btn" type="submit">Predict</button>
      </div>
    </form>

    <div id="status" class="status"></div>
    <pre id="output">Waiting for input...</pre>
  </main>

  <script>
    const form = document.getElementById("predict-form");
    const fileInput = document.getElementById("file");
    const output = document.getElementById("output");
    const status = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");

    const setStatus = (text, kind = "") => {
      status.textContent = text;
      status.className = `status ${kind}`.trim();
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!fileInput.files || !fileInput.files[0]) {
        setStatus("Select an image first.", "err");
        return;
      }

      submitBtn.disabled = true;
      setStatus("Running prediction...");
      output.textContent = "";

      try {
        const fd = new FormData();
        fd.append("file", fileInput.files[0]);

        const res = await fetch("/predict", { method: "POST", body: fd });
        const data = await res.json();

        if (!res.ok) {
          setStatus("Prediction failed.", "err");
          output.textContent = JSON.stringify(data, null, 2);
        } else {
          setStatus("Prediction completed.", "ok");
          output.textContent = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        setStatus("Request failed.", "err");
        output.textContent = String(err);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
