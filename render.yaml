services:
  - type: web
    name: brain-tumor-classifier-render
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_PATH
        value: /opt/render/project/src/models/brain_tumor_efficientnetb0_final.pth
      - key: TORCH_HOME
        value: /opt/render/project/.cache/torch
