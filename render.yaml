# render.yaml
# ────────────
# Render Blueprint — defines the Web Service declaratively.
# Commit this file to the repo root and Render will auto-configure the service.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: brain-tumor-classifier
    runtime: python
    region: oregon          # pick the region closest to your users
    plan: free              # upgrade to 'starter' ($7/mo) for always-on + more RAM

    # ── Build ──────────────────────────────────────────────────────────────
    buildCommand: pip install -r requirements.txt

    # ── Start ──────────────────────────────────────────────────────────────
    # gunicorn is the production WSGI server.
    # --workers 1  — EfficientNet is not fork-safe; keep a single worker.
    # --timeout 120 — first request loads the 47 MB model; give it headroom.
    # $PORT is injected by Render automatically.
    startCommand: gunicorn src.app.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120

    # ── Environment variables ───────────────────────────────────────────────
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MODEL_PATH
        value: /data/models/brain_tumor_efficientnetb0_final.pth
        # ↑ Path on the Render Disk (see 'disk' section below).
        #   If you are NOT using a Disk, change this to the repo-relative path
        #   and commit the model file (not recommended for large files).

    # ── Persistent disk for the model weights ──────────────────────────────
    # Render Disks are NOT available on the free plan.
    # On the Starter plan ($7/mo + $0.25/GB), uncomment this block:
    #
    # disk:
    #   name: model-storage
    #   mountPath: /data/models
    #   sizeGB: 1
    #
    # Then upload the .pth file once via Render Shell:
    #   render ssh <service-name>
    #   # inside the shell:
    #   mkdir -p /data/models
    #   # upload via scp from your local machine:
    #   scp brain_tumor_efficientnetb0_final.pth <service>:/data/models/

    # ── Health check ───────────────────────────────────────────────────────
    healthCheckPath: /health
