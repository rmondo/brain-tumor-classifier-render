services:
  - type: web
    name: brain-tumor-classifier
    env: python
    plan: free

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      APP_ENV=production gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: APP_ENV
        value: production

      - key: MODEL_PATH
        value: /opt/render/project/src/models/brain_tumor_efficientnetb0_final.pth